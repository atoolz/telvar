      <text x="12" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.85)">flyteconsole</text>
      <text x="12" y="38" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">Web UI for Flyte</text>
      <rect x="12" y="48" width="55" height="14" rx="7" fill="rgba(255,255,255,0.05)"/>
      <text x="39" y="58" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">component</text>
      <rect x="72" y="48" width="52" height="14" rx="7" fill="rgba(255,255,255,0.05)"/>
      <text x="98" y="58" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">javascript</text>
      <rect x="12" y="70" width="60" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
      <rect x="12" y="70" width="12" height="3" rx="1.5" fill="#fafafa" opacity="0.2"/>
      <text x="78" y="74" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="rgba(255,255,255,0.2)">20%</text>
