      <text x="12" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.85)">flyteidl</text>
      <text x="12" y="38" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">Protobuf definitions</text>
      <rect x="12" y="48" width="24" height="14" rx="7" fill="rgba(255,255,255,0.05)"/>
      <text x="24" y="58" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">api</text>
      <rect x="40" y="48" width="24" height="14" rx="7" fill="rgba(255,255,255,0.05)"/>
      <text x="52" y="58" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">go</text>
      <rect x="12" y="70" width="60" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
      <rect x="12" y="70" width="48" height="3" rx="1.5" fill="#fafafa" opacity="0.5"/>
      <text x="78" y="74" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="rgba(255,255,255,0.5)">80%</text>
    </g>

    <!-- Cards row 3 (partial, fade) -->
    <g transform="translate(20, 342)" opacity="0.4">
      <rect width="228" height="85" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
      <text x="12" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.85)">flyte-docs</text>
    </g>
    <g transform="translate(260, 342)" opacity="0.4">
      <rect width="228" height="85" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
      <text x="12" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.85)">flyte-sdk</text>
    </g>

    <!-- Fade gradient at bottom -->
    <rect y="400" width="510" height="80" rx="0" fill="url(#fade)" opacity="0.8"/>

    <!-- Scrollbar -->
    <rect x="500" y="148" width="2.5" height="250" rx="1.25" fill="rgba(255,255,255,0.04)"/>
    <rect x="500" y="148" width="2.5" height="100" rx="1.25" fill="rgba(255,255,255,0.1)"/>
  </g>

  <!-- Bottom -->
  <text x="80" y="530" font-family="-apple-system,sans-serif" font-size="13" fill="rgba(255,255,255,0.2)">github.com/atoolz/telvar</text>
  <g transform="translate(80, 548)">
    <rect width="140" height="26" rx="13" fill="rgba(255,255,255,0.06)"/>
    <text x="70" y="17" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.4)">Go + SQLite + htmx</text>
  </g>

  <!-- Top line -->
  <rect x="0" y="0" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
