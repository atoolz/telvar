<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0f1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="350" cy="315" rx="300" ry="200" fill="#6366f1" opacity="0.05" filter="url(#glow)"/>

  <!-- Left side: branding -->
  <g transform="translate(80, 100)">
    <!-- Logo -->
    <rect width="64" height="64" rx="14" fill="url(#accent)"/>
    <text x="32" y="44" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="30" font-weight="800" fill="white" letter-spacing="-1">Tv</text>
    <rect x="12" y="52" width="40" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>

    <!-- Title -->
    <text x="80" y="28" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="42" font-weight="800" fill="white" letter-spacing="-2">Telvar</text>
    <text x="80" y="55" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="16" font-weight="400" fill="#818cf8" letter-spacing="3">DEVELOPER PORTAL</text>
  </g>

  <!-- Headline -->
  <text x="80" y="230" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="36" font-weight="700" fill="white">Your infrastructure already</text>
  <text x="80" y="275" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="36" font-weight="700" fill="white">describes itself.</text>
  <text x="80" y="320" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="36" font-weight="700" fill="#818cf8">We just read it.</text>

  <!-- Feature list -->
  <g transform="translate(80, 370)">
    <circle cx="8" cy="8" r="4" fill="#6366f1"/>
    <text x="24" y="13" font-family="-apple-system,sans-serif" font-size="16" fill="#e1e4eb">Auto-discovers services from GitHub + Kubernetes</text>
  </g>
  <g transform="translate(80, 400)">
    <circle cx="8" cy="8" r="4" fill="#6366f1"/>
    <text x="24" y="13" font-family="-apple-system,sans-serif" font-size="16" fill="#e1e4eb">Scorecards, CVE checking, docs viewer</text>
  </g>
  <g transform="translate(80, 430)">
    <circle cx="8" cy="8" r="4" fill="#6366f1"/>
    <text x="24" y="13" font-family="-apple-system,sans-serif" font-size="16" fill="#e1e4eb">Single binary, SQLite, zero config</text>
  </g>
  <g transform="translate(80, 460)">
    <circle cx="8" cy="8" r="4" fill="#22c55e"/>
    <text x="24" y="13" font-family="-apple-system,sans-serif" font-size="16" fill="#e1e4eb">Open source (AGPLv3) - not another SaaS</text>
  </g>

  <!-- Right side: mock terminal/UI -->
  <g transform="translate(650, 90)">
    <!-- Terminal window -->
    <rect width="480" height="440" rx="12" fill="#1a1d27" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Title bar -->
    <rect width="480" height="36" rx="12" fill="#222633"/>
    <rect y="24" width="480" height="12" fill="#222633"/>
    <circle cx="20" cy="18" r="5" fill="#ff5f57"/>
    <circle cx="38" cy="18" r="5" fill="#febc2e"/>
    <circle cx="56" cy="18" r="5" fill="#28c840"/>
    <text x="240" y="22" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" fill="rgba(255,255,255,0.4)">telvar - localhost:7007</text>

    <!-- Nav bar -->
    <rect y="36" width="480" height="32" fill="rgba(255,255,255,0.03)"/>
    <text x="20" y="56" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#818cf8">T</text>
    <text x="30" y="56" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">elvar</text>
    <text x="100" y="56" font-family="-apple-system,sans-serif" font-size="12" fill="white">Services</text>
    <text x="170" y="56" font-family="-apple-system,sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Teams</text>

    <!-- Header -->
    <text x="20" y="95" font-family="-apple-system,sans-serif" font-size="18" font-weight="600" fill="white">Services</text>
    <rect x="390" y="78" width="70" height="26" rx="6" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="425" y="95" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#818cf8">27</text>

    <!-- Search bar -->
    <rect x="20" y="110" width="440" height="30" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="32" y="130" font-family="-apple-system,sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">Search services...</text>

    <!-- Entity cards -->
    <g transform="translate(20, 155)">
      <rect width="215" height="90" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <text x="12" y="24" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="white">flyte</text>
      <text x="12" y="42" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Workflow orchestration platform</text>
      <rect x="12" y="52" width="55" height="16" rx="8" fill="rgba(99,102,241,0.2)"/>
      <text x="39" y="63" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#818cf8">component</text>
      <rect x="72" y="52" width="28" height="16" rx="8" fill="rgba(96,165,250,0.2)"/>
      <text x="86" y="63" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#60a5fa">go</text>
      <!-- Score bar -->
      <rect x="12" y="76" width="60" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
      <rect x="12" y="76" width="48" height="4" rx="2" fill="#22c55e"/>
      <text x="78" y="81" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="#22c55e">80%</text>
    </g>

    <g transform="translate(245, 155)">
      <rect width="215" height="90" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <text x="12" y="24" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="white">flytekit</text>
      <text x="12" y="42" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Python SDK for Flyte</text>
      <rect x="12" y="52" width="55" height="16" rx="8" fill="rgba(99,102,241,0.2)"/>
      <text x="39" y="63" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#818cf8">component</text>
      <rect x="72" y="52" width="45" height="16" rx="8" fill="rgba(96,165,250,0.2)"/>
      <text x="94" y="63" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#60a5fa">python</text>
      <rect x="12" y="76" width="60" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
      <rect x="12" y="76" width="36" height="4" rx="2" fill="#eab308"/>
      <text x="78" y="81" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="#eab308">60%</text>
    </g>

    <g transform="translate(20, 255)">
      <rect width="215" height="90" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <text x="12" y="24" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="white">flyteconsole</text>
      <text x="12" y="42" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Web UI for Flyte</text>
      <rect x="12" y="52" width="55" height="16" rx="8" fill="rgba(99,102,241,0.2)"/>
      <text x="39" y="63" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#818cf8">component</text>
      <rect x="72" y="52" width="55" height="16" rx="8" fill="rgba(96,165,250,0.2)"/>
      <text x="99" y="63" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#60a5fa">javascript</text>
      <rect x="12" y="76" width="60" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
      <rect x="12" y="76" width="12" height="4" rx="2" fill="#ef4444"/>
      <text x="78" y="81" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="#ef4444">20%</text>
    </g>

    <g transform="translate(245, 255)">
      <rect width="215" height="90" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
      <text x="12" y="24" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="white">flyteidl</text>
      <text x="12" y="42" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Protobuf definitions</text>
      <rect x="12" y="52" width="25" height="16" rx="8" fill="rgba(168,139,250,0.2)"/>
      <text x="24" y="63" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#a78bfa">api</text>
      <rect x="42" y="52" width="28" height="16" rx="8" fill="rgba(96,165,250,0.2)"/>
      <text x="56" y="63" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#60a5fa">go</text>
      <rect x="12" y="76" width="60" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
      <rect x="12" y="76" width="48" height="4" rx="2" fill="#22c55e"/>
      <text x="78" y="81" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="#22c55e">80%</text>
    </g>

    <!-- Scrollbar hint -->
    <rect x="470" y="155" width="3" height="180" rx="1.5" fill="rgba(255,255,255,0.06)"/>
    <rect x="470" y="155" width="3" height="80" rx="1.5" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Bottom bar -->
  <text x="80" y="540" font-family="-apple-system,sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">github.com/atoolz/telvar</text>
  <g transform="translate(80, 555)">
    <rect width="140" height="28" rx="14" fill="url(#accent)"/>
    <text x="70" y="19" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Go + SQLite + htmx</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
