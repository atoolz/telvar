    <text x="20" y="90" font-family="-apple-system,sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.9)">Services</text>
    <rect x="420" y="75" width="70" height="22" rx="11" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="455" y="90" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">27</text>

    <!-- Search -->
    <rect x="20" y="105" width="470" height="28" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="32" y="123" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">Search services...</text>

    <!-- Cards row 1 -->
    <g transform="translate(20, 148)">
      <rect width="228" height="85" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
      <text x="12" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.85)">flyte</text>
      <text x="12" y="38" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">Workflow orchestration platform</text>
      <rect x="12" y="48" width="55" height="14" rx="7" fill="rgba(255,255,255,0.05)"/>
      <text x="39" y="58" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">component</text>
      <rect x="72" y="48" width="24" height="14" rx="7" fill="rgba(255,255,255,0.05)"/>
      <text x="84" y="58" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">go</text>
      <rect x="12" y="70" width="60" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
      <rect x="12" y="70" width="48" height="3" rx="1.5" fill="#fafafa" opacity="0.5"/>
      <text x="78" y="74" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="rgba(255,255,255,0.5)">80%</text>
    </g>

    <g transform="translate(260, 148)">
      <rect width="228" height="85" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
      <text x="12" y="22" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.85)">flytekit</text>
      <text x="12" y="38" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">Python SDK for Flyte</text>
      <rect x="12" y="48" width="55" height="14" rx="7" fill="rgba(255,255,255,0.05)"/>
      <text x="39" y="58" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">component</text>
      <rect x="72" y="48" width="42" height="14" rx="7" fill="rgba(255,255,255,0.05)"/>
      <text x="93" y="58" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">python</text>
      <rect x="12" y="70" width="60" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
      <rect x="12" y="70" width="36" height="3" rx="1.5" fill="#fafafa" opacity="0.3"/>
      <text x="78" y="74" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="rgba(255,255,255,0.35)">60%</text>
