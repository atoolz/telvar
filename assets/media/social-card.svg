    <rect x="14" y="41" width="16" height="16" rx="4" fill="#fafafa"/>
    <rect x="17" y="45" width="9" height="2.5" rx="0.5" fill="#111"/>
    <rect x="20.5" y="45" width="3.5" height="9" rx="0.5" fill="#111"/>
    <text x="40" y="54" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)">Services</text>
    <text x="100" y="54" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">Teams</text>

