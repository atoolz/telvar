<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left side: branding -->
  <g transform="translate(80, 80)">
    <!-- Icon -->
    <rect width="56" height="56" rx="14" fill="#fafafa"/>
    <rect x="10" y="14" width="30" height="7" rx="1.5" fill="#0a0a0a"/>
    <rect x="21" y="14" width="10" height="28" rx="1.5" fill="#0a0a0a"/>
    <rect x="15" y="14" width="30" height="7" rx="1.5" fill="#0a0a0a" opacity="0.12"/>
    <!-- Title -->
    <text x="70" y="24" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif" font-size="36" font-weight="700" fill="#fafafa" letter-spacing="-2">Telvar</text>
    <text x="70" y="48" font-family="-apple-system,sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" letter-spacing="3">DEVELOPER PORTAL</text>
  </g>

  <!-- Headline -->
  <text x="80" y="210" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif" font-size="34" font-weight="600" fill="#fafafa">Your infrastructure already</text>
  <text x="80" y="252" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif" font-size="34" font-weight="600" fill="#fafafa">describes itself.</text>
  <text x="80" y="294" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif" font-size="34" font-weight="600" fill="rgba(255,255,255,0.4)">We just read it.</text>

  <!-- Feature list -->
  <g transform="translate(80, 340)">
    <rect width="4" height="4" rx="1" fill="rgba(255,255,255,0.4)" y="6"/>
    <text x="16" y="12" font-family="-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.6)">Auto-discovers services from GitHub + Kubernetes</text>
  </g>
  <g transform="translate(80, 368)">
    <rect width="4" height="4" rx="1" fill="rgba(255,255,255,0.4)" y="6"/>
    <text x="16" y="12" font-family="-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.6)">Scorecards, CVE checking, docs viewer</text>
  </g>
  <g transform="translate(80, 396)">
    <rect width="4" height="4" rx="1" fill="rgba(255,255,255,0.4)" y="6"/>
    <text x="16" y="12" font-family="-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.6)">Single Go binary, SQLite, zero config</text>
  </g>
  <g transform="translate(80, 424)">
    <rect width="4" height="4" rx="1" fill="rgba(255,255,255,0.4)" y="6"/>
    <text x="16" y="12" font-family="-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.6)">Open source (AGPLv3)</text>
  </g>

  <!-- Right side: mock UI -->
  <g transform="translate(620, 60)">
    <rect width="510" height="480" rx="12" fill="#111111" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Title bar -->
    <rect width="510" height="36" rx="12" fill="#181818"/>
    <rect y="24" width="510" height="12" fill="#181818"/>
    <circle cx="20" cy="18" r="4.5" fill="rgba(255,255,255,0.12)"/>
    <circle cx="36" cy="18" r="4.5" fill="rgba(255,255,255,0.12)"/>
    <circle cx="52" cy="18" r="4.5" fill="rgba(255,255,255,0.12)"/>
    <text x="255" y="22" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="rgba(255,255,255,0.2)">telvar - localhost:7007</text>

