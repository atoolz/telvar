<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Header -->
  <text x="600" y="65" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" fill="rgba(255,255,255,0.25)" letter-spacing="4">WHY NOT BACKSTAGE?</text>
  <text x="600" y="110" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif" font-size="36" font-weight="600" fill="#fafafa">90% of adopters stall at 10% usage</text>
  <text x="600" y="142" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.3)">Spotify's own data. Here's why.</text>

  <!-- Column headers -->
  <rect x="100" y="175" width="400" height="36" rx="6" fill="rgba(255,255,255,0.03)"/>
  <text x="300" y="198" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.35)">Backstage</text>
  <rect x="520" y="175" width="120" height="36" rx="0" fill="transparent"/>
  <rect x="660" y="175" width="400" height="36" rx="6" fill="rgba(255,255,255,0.06)"/>
  <text x="860" y="198" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">Telvar</text>

  <!-- Rows -->
  <!-- Row 1 -->
  <text x="580" y="250" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" letter-spacing="1">TIME TO VALUE</text>
  <text x="300" y="250" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="16" fill="rgba(255,255,255,0.35)">3-6 months</text>
  <text x="860" y="250" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="16" font-weight="600" fill="#fafafa">5 minutes</text>

  <!-- Row 2 -->
  <text x="580" y="300" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" letter-spacing="1">TEAM NEEDED</text>
  <text x="300" y="300" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="16" fill="rgba(255,255,255,0.35)">2-5 platform engineers</text>
  <text x="860" y="300" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="16" font-weight="600" fill="#fafafa">0 (config file)</text>

  <!-- Row 3 -->
  <text x="580" y="350" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" letter-spacing="1">ANNUAL COST (200 DEVS)</text>
  <text x="300" y="350" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="16" fill="rgba(255,255,255,0.35)">~$150k eng time</text>
  <text x="860" y="350" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="16" font-weight="600" fill="#fafafa">$0</text>

  <!-- Row 4 -->
  <text x="580" y="400" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" letter-spacing="1">DEPLOYMENT</text>
  <text x="300" y="400" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="16" fill="rgba(255,255,255,0.35)">K8s + PostgreSQL + Node.js</text>
  <text x="860" y="400" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="16" font-weight="600" fill="#fafafa">Single binary</text>

  <!-- Row 5 -->
  <text x="580" y="450" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" letter-spacing="1">DATA ENTRY</text>
  <text x="300" y="450" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="16" fill="rgba(255,255,255,0.35)">YAML per repo (manual)</text>
  <text x="860" y="450" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="16" font-weight="600" fill="#fafafa">Full auto-discovery</text>

  <!-- Separator lines -->
  <line x1="100" y1="220" x2="1100" y2="220" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="100" y1="270" x2="1100" y2="270" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="100" y1="320" x2="1100" y2="320" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="100" y1="370" x2="1100" y2="370" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="100" y1="420" x2="1100" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- CTA -->
  <g transform="translate(480, 500)">
    <rect width="240" height="40" rx="20" fill="#fafafa"/>
    <text x="120" y="26" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="#0a0a0a">github.com/atoolz/telvar</text>
  </g>

  <!-- Telvar icon in corner -->
  <g transform="translate(1130, 20)">
    <rect width="36" height="36" rx="9" fill="#fafafa"/>
    <rect x="6" y="9" width="20" height="4.5" rx="1" fill="#0a0a0a"/>
    <rect x="14" y="9" width="7" height="18" rx="1" fill="#0a0a0a"/>
    <rect x="10" y="9" width="20" height="4.5" rx="1" fill="#0a0a0a" opacity="0.12"/>
  </g>

  <!-- Top line -->
  <rect x="0" y="0" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
</svg>
