<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="480" fill="#0a0a0a"/>
  <rect width="1280" height="480" fill="url(#grid)"/>

  <!-- Decorative code (left) -->
  <text x="60" y="100" font-family="JetBrains Mono,Fira Code,Consolas,monospace" font-size="13" fill="rgba(255,255,255,0.04)">type Entity struct {</text>
  <text x="60" y="118" font-family="JetBrains Mono,Fira Code,Consolas,monospace" font-size="13" fill="rgba(255,255,255,0.04)">  Name     string</text>
  <text x="60" y="136" font-family="JetBrains Mono,Fira Code,Consolas,monospace" font-size="13" fill="rgba(255,255,255,0.04)">  Kind     EntityKind</text>
  <text x="60" y="154" font-family="JetBrains Mono,Fira Code,Consolas,monospace" font-size="13" fill="rgba(255,255,255,0.04)">  Score    *ScoreResult</text>
  <text x="60" y="172" font-family="JetBrains Mono,Fira Code,Consolas,monospace" font-size="13" fill="rgba(255,255,255,0.04)">}</text>

  <!-- Decorative code (right) -->
  <text x="940" y="340" font-family="JetBrains Mono,Fira Code,Consolas,monospace" font-size="13" fill="rgba(255,255,255,0.04)">scorecards:</text>
  <text x="940" y="358" font-family="JetBrains Mono,Fira Code,Consolas,monospace" font-size="13" fill="rgba(255,255,255,0.04)">  - name: production-readiness</text>
  <text x="940" y="376" font-family="JetBrains Mono,Fira Code,Consolas,monospace" font-size="13" fill="rgba(255,255,255,0.04)">    rules:</text>
  <text x="940" y="394" font-family="JetBrains Mono,Fira Code,Consolas,monospace" font-size="13" fill="rgba(255,255,255,0.04)">      - check: has_file("README.md")</text>

  <!-- Icon -->
  <g transform="translate(568, 100)">
    <rect width="72" height="72" rx="16" fill="#fafafa"/>
    <rect x="13" y="17" width="38" height="9" rx="1.8" fill="#0a0a0a"/>
    <rect x="28" y="17" width="13" height="36" rx="1.8" fill="#0a0a0a"/>
    <rect x="21" y="17" width="38" height="9" rx="1.8" fill="#0a0a0a" opacity="0.12"/>
  </g>

  <!-- Title -->
  <text x="640" y="232" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="64" font-weight="700" fill="#fafafa" letter-spacing="-3">Telvar</text>

  <!-- Accent line -->
  <rect x="540" y="248" width="200" height="1.5" rx="0.75" fill="rgba(255,255,255,0.15)"/>

  <!-- Subtitle -->
  <text x="640" y="282" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="5">DEVELOPER PORTAL</text>

  <!-- Tagline -->
  <text x="640" y="318" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="rgba(255,255,255,0.3)">Zero authoring  ·  One binary  ·  Five minutes</text>

  <!-- Feature pills -->
  <g transform="translate(280, 355)">
    <rect width="90" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="45" y="18" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">GitHub</text>
  </g>
  <g transform="translate(385, 355)">
    <rect width="105" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="52" y="18" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">Kubernetes</text>
  </g>
  <g transform="translate(505, 355)">
    <rect width="100" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="50" y="18" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">Scorecards</text>
  </g>
  <g transform="translate(620, 355)">
    <rect width="100" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="50" y="18" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">PagerDuty</text>
  </g>

  <!-- Bottom -->
  <text x="640" y="430" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="rgba(255,255,255,0.15)">github.com/atoolz/telvar</text>
  <g transform="translate(565, 445)">
    <rect width="150" height="26" rx="13" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="75" y="17" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Go + SQLite + htmx</text>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="2" fill="rgba(255,255,255,0.08)"/>
</svg>
